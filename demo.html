<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDP PointPlus — โหมดตัวอย่าง (ข้อมูลจำลอง)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
  <style>
    #demo-bar { position: sticky; top: 0; left: 0; right: 0; z-index: 1300;
      background: #141414; color: #fff; padding: 8px 14px; display: flex; align-items: center; gap: 10px; justify-content: center; flex-wrap: wrap; }
    #demo-bar span { font-size: 14px; color: #bdbdbd; }
    #demo-bar button { border: 1px solid #952fc6; background: transparent; color: #fff; padding: 5px 16px; border-radius: 2px; font-weight: 600; cursor: pointer; }
    #demo-bar button.active { background: #952fc6; }
  </style>
</head>
<body>
  <!-- แถบสลับบทบาท (ด้านบนสุด) -->
  <div id="demo-bar">
    <span>โหมดตัวอย่าง (ข้อมูลจำลอง) — ดูมุมมอง:</span>
    <button data-role="student" class="active" onclick="DEMO.setRole('student')">🎒 นักเรียน</button>
    <button data-role="teacher" onclick="DEMO.setRole('teacher')">👩‍🏫 ครู</button>
    <button data-role="admin" onclick="DEMO.setRole('admin')">🛠️ แอดมิน</button>
  </div>

  <!-- login-view (ซ่อนทันทีเพราะ mock login อัตโนมัติ) -->
  <div id="login-view" class="d-none">
    <div id="google-signin-btn"></div>
  </div>

  <!-- แอปหลัก -->
  <div id="app-view" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <span class="navbar-brand fw-bold d-flex align-items-center"><img src="assets/logo.png" alt="โลโก้" class="navbar-logo me-2">PDP PointPlus</span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto" id="nav-items"></ul>
          <div class="d-flex align-items-center text-white">
            <span id="nav-user" class="me-3 small"></span>
            <button id="btn-signout" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right"></i> ออก</button>
          </div>
        </div>
      </div>
    </nav>
    <main class="container-fluid py-4" id="content"></main>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>
  <div id="loading-overlay" class="d-none"><div class="spinner-border text-light" role="status"></div></div>
  <div id="modal-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/demo-mock.js"></script>
  <script src="js/export.js"></script>
  <script src="js/views/student.js"></script>
  <script src="js/views/teacher.js"></script>
  <script src="js/views/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
