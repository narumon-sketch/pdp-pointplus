<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDP PointPlus — ระบบสะสมชั่วโมงกิจกรรม</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>

  <!-- ===== หน้า Login ===== -->
  <div id="login-view" class="d-flex flex-column justify-content-center align-items-center vh-100 text-center px-3">
    <div class="login-card card shadow-sm p-4 p-md-5">
      <img src="assets/logo.png" alt="โลโก้โรงเรียน" class="login-logo mb-3"
           onerror="this.onerror=null; this.outerHTML='&lt;i class=&quot;bi bi-clock-history display-3 text-primary mb-3&quot;&gt;&lt;/i&gt;'">
      <h1 class="h3 fw-bold mb-1">PDP PointPlus</h1>
      <p class="text-muted mb-4">ระบบสะสมชั่วโมงกิจกรรมบำเพ็ญประโยชน์</p>
      <div id="google-signin-btn" class="d-flex justify-content-center"></div>
      <p class="small text-muted mt-4 mb-0">เข้าสู่ระบบด้วยอีเมล<br>@pdp.ac.th หรือ @stu.pdp.ac.th</p>
    </div>
  </div>

  <!-- ===== แอปหลัก (หลัง login) ===== -->
  <div id="app-view" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
      <div class="container-fluid">
        <span class="navbar-brand fw-bold d-flex align-items-center"><img src="assets/logo.png" alt="โลโก้" class="navbar-logo me-2">PDP PointPlus</span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto" id="nav-items"></ul>
          <div class="d-flex align-items-center text-white">
            <span id="nav-user" class="me-3 small"></span>
            <button id="btn-signout" class="btn btn-sm btn-outline-light">
              <i class="bi bi-box-arrow-right"></i> ออก
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container-fluid py-4" id="content"></main>
  </div>

  <!-- toast + loading -->
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>
  <div id="loading-overlay" class="d-none">
    <div class="spinner-border text-light" role="status"></div>
  </div>

  <!-- container สำหรับ modal -->
  <div id="modal-root"></div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- App scripts (เรียงตาม dependency) -->
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/export.js"></script>
  <script src="js/views/student.js"></script>
  <script src="js/views/teacher.js"></script>
  <script src="js/views/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
